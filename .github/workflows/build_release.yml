name: Build prebuilt deps

# Per-platform matrix: builds every recipe, packs one content-addressed archive
# per dep, uploads them as write-once assets of the `prebuilt` release, then a
# single collect job merges the per-platform lock fragments into prebuilt.lock
# and commits it. Consumers pin the muse_deps commit and verify archives against
# the lock — assets are never overwritten.

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "all | comma list of: macos,windows,woa,linux,linux-arm64"
        required: true
        default: all

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          P="${{ inputs.platforms }}"; [ "$P" = "all" ] && P="macos,windows,woa,linux,linux-arm64"
          inc=""; add() { inc="$inc${inc:+,}$1"; }
          IFS=',' read -ra arr <<< "$P"
          for p in "${arr[@]}"; do case "$(echo "$p"|xargs)" in
            linux)       add '{"os":"linux","arch":"x86_64","runner":"ubuntu-22.04"}' ;;
            linux-arm64) add '{"os":"linux","arch":"aarch64","runner":"ubuntu-22.04-arm"}' ;;
            windows)     add '{"os":"windows","arch":"x86_64","runner":"windows-2022"}' ;;
            woa)         add '{"os":"windows","arch":"aarch64","runner":"windows-11-arm"}' ;;
            macos)       add '{"os":"macos","arch":"universal","runner":"macos-15"}' ;;
          esac; done
          echo "matrix={\"include\":[$inc]}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch == 'aarch64' && 'arm64' || 'amd64' }}
      - if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build p7zip-full libasound2-dev
      - if: matrix.os == 'macos'
        run: brew install ninja sevenzip
      - if: matrix.os == 'windows'
        run: choco install ninja 7zip -y
      - name: Build platform deps
        shell: bash
        run: cmake -DOS=${{ matrix.os }} -DARCH=${{ matrix.arch }} -P buildtools/build_platform.cmake
      - uses: actions/upload-artifact@v4
        with:
          name: out-${{ matrix.os }}-${{ matrix.arch }}
          path: .build/platform/out/
          if-no-files-found: error

  collect:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/download-artifact@v4
        with:
          pattern: out-*
          merge-multiple: true
          path: out
      - name: Upload archives (write-once)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view prebuilt >/dev/null 2>&1 \
            || gh release create prebuilt --title prebuilt \
                 --notes "Content-addressed prebuilt dependency archives; index in prebuilt.lock."
          existing=$(gh release view prebuilt --json assets -q '.assets[].name')
          : > skipped.txt
          for f in out/*.7z; do
            name=$(basename "$f")
            if grep -qx "$name" <<< "$existing"; then
              echo "skip $name (already published)"
              echo "$name" >> skipped.txt
            else
              gh release upload prebuilt "$f"
            fi
          done
      # Builds are not bit-reproducible: a rebuilt archive whose name (recipe sig)
      # is already published differs in bytes from the published asset. The asset
      # is write-once, so its lock line must record the PUBLISHED bytes' sha.
      - name: Merge lock fragments and commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p .published
          for frag in out/prebuilt-*.lock; do
            os_arch=$(basename "$frag" .lock | sed 's/^prebuilt-//')
            os=${os_arch%-*}; arch=${os_arch##*-}
            [ -f prebuilt.lock ] && grep -v " $os $arch " prebuilt.lock > prebuilt.lock.tmp || : > prebuilt.lock.tmp
            while read -r name ver los larch file sha; do
              if grep -qx "$file" skipped.txt; then
                [ -f ".published/$file" ] || gh release download prebuilt --pattern "$file" --dir .published
                sha=$(sha256sum ".published/$file" | awk '{print $1}')
              fi
              echo "$name $ver $los $larch $file $sha" >> prebuilt.lock.tmp
            done < "$frag"
            sort -o prebuilt.lock prebuilt.lock.tmp && rm prebuilt.lock.tmp
          done
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add prebuilt.lock
          git diff --cached --quiet || git commit -m "prebuilt.lock: $(ls out/prebuilt-*.lock | xargs -n1 basename | sed 's/^prebuilt-//;s/.lock$//' | paste -sd, -)"
          git push

  source-bundle:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y p7zip-full
      - name: Build source bundle
        run: cmake -P buildtools/build_source_bundle.cmake
      - name: Upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view sources >/dev/null 2>&1 \
            || gh release create sources --title sources --notes "Pristine dependency source mirror + offline bundles"
          f="sources-$(git rev-parse --short HEAD).7z"
          mv sources.7z "$f"
          if gh release view sources --json assets -q '.assets[].name' | grep -qx "$f"; then
            echo "skip $f (already published)"
          else
            gh release upload sources "$f"
          fi
